<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padma Turtle | Kuantitatif Hedge Fund</title>
    <style>
        /* --- GLOBAL STYLES & VARIABLES --- */
        :root {
            --bg-main: #0b0f17;
            --bg-card: #121824;
            --primary: #10b981; /* Emerald/Jade Green */
            --primary-hover: #059669;
            --accent: #d4af37; /* Gold */
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --border: #21262d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: rgba(11, 15, 23, 0.85);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        .logo span {
            color: var(--primary);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav ul li a:hover {
            color: var(--primary);
        }

        .btn-contact {
            background-color: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 4px;
            font-weight: 600;
        }

        .btn-contact:hover {
            background-color: var(--primary);
            color: var(--bg-main);
        }

        /* --- HERO SECTION --- */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            background: radial-gradient(circle at center, #11221a 0%, var(--bg-main) 70%);
            margin-top: 60px;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .hero h1 span {
            color: var(--primary);
            position: relative;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 40px;
        }

        .hero .cta-buttons {
            display: flex;
            gap: 20px;
        }

        .btn-filled {
            background-color: var(--primary);
            color: var(--bg-main);
            padding: 12px 30px;
            border-radius: 4px;
            font-weight: bold;
        }

        .btn-filled:hover {
            background-color: var(--primary-hover);
        }

        .btn-outline {
            border: 1px solid var(--border);
            padding: 12px 30px;
            border-radius: 4px;
            font-weight: bold;
        }

        .btn-outline:hover {
            background-color: var(--border);
        }

        /* --- PHILOSOPHY / ABOUT --- */
        .section {
            padding: 100px 8%;
        }

        .section-title {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 60px;
            font-weight: 700;
        }

        .section-title span {
            color: var(--primary);
        }

        .grid-about {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .about-text h3 {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 15px;
        }

        .about-text p {
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* --- STRATEGY / PERFORMANCE --- */
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

            border: 1px solid var(--border);
